<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Commerce Hub Checkout SDK v2 — Basic Example</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 24px; }
    select, input, button { font: inherit; padding: 8px 12px; margin: 4px 0; }
    button { background: #1a73e8; color: white; border: 0; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #bbb; cursor: not-allowed; }
    .log { background: #111; color: #0f0; padding: 12px; border-radius: 6px; font-family: ui-monospace, monospace; font-size: 12px; max-height: 320px; overflow: auto; }
    .row { display: flex; gap: 12px; align-items: center; margin: 12px 0; }
  </style>
</head>
<body>
  <h1>Commerce Hub Checkout SDK v2</h1>
  <p>Basic example showing the industry-standard Stripe / Adyen pattern: merchant backend creates a session, browser SDK consumes it.</p>

  <div class="row">
    <label>APM:</label>
    <select id="apm">
      <option value="klarna">Klarna (server-bnpl)</option>
      <option value="paypal">PayPal (redirect-wallet)</option>
      <option value="ideal">iDEAL (bank-redirect, async)</option>
      <option value="alipayplus">Alipay+ (qr-code, async)</option>
      <option value="boleto">Boleto (voucher-cash, async)</option>
      <option value="applepay">Apple Pay (native-wallet, sync)</option>
    </select>
    <label>Amount: $</label>
    <input id="amount" type="number" value="49.99" step="0.01" min="0.01">
  </div>

  <button id="pay">Pay</button>

  <h3>Events</h3>
  <div class="log" id="log">(no events yet)</div>

  <script type="module">
    // In a real merchant integration this would be a versioned import:
    //   import { createCheckout } from '@commercehub/checkout-sdk-browser';
    // For the example we point at the local TS source; bundlers should
    // resolve via the package.json exports field.
    import { createCheckout } from '../packages/checkout-sdk-browser/src/index.ts';

    const REFERENCE_SERVER = 'http://localhost:3848';
    const log = document.getElementById('log');
    const append = (msg) => {
      log.textContent = log.textContent === '(no events yet)' ? '' : log.textContent;
      log.textContent += `[${new Date().toISOString()}] ${msg}\n`;
      log.scrollTop = log.scrollHeight;
    };

    document.getElementById('pay').addEventListener('click', async () => {
      const apm = document.getElementById('apm').value;
      const value = parseFloat(document.getElementById('amount').value);
      append(`Creating session for ${apm} amount=$${value}…`);

      // 1) Merchant backend creates the session (industry-standard pattern)
      const sessionRes = await fetch(`${REFERENCE_SERVER}/v2/sessions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          apm,
          amount: { value, currency: 'USD' },
          merchantOrderId: `ORDER-${Date.now()}`,
        }),
      });
      if (!sessionRes.ok) {
        append(`Session creation failed: ${sessionRes.status}`);
        return;
      }
      const session = await sessionRes.json();
      append(`Session created: ${session.sessionId}`);

      // 2) Browser SDK consumes the session
      const checkout = createCheckout({
        apm,
        amount: { value, currency: 'USD' },
        merchantOrderId: `ORDER-${Date.now()}`,
        credentials: {
          accessToken: session.accessToken,
          sessionId: session.sessionId,
          chBaseUrl: REFERENCE_SERVER,
          providerClientToken: session.providerClientToken,
          eventsBaseUrl: REFERENCE_SERVER,
        },
        returnUrls: {
          successUrl: window.location.href,
          cancelUrl: window.location.href,
        },
      });

      checkout.onAny((event) => {
        append(`event: ${event.type}${event.type === 'PAYMENT_COMPLETED' ? ' ✓' : ''}`);
      });

      try {
        await checkout.init();
        await checkout.render();
        await checkout.authorize();
      } catch (err) {
        append(`error: ${err.message}`);
      }
    });
  </script>
</body>
</html>
